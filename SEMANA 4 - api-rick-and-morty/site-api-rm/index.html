<!DOCTYPE html>
<!-- Define que o documento está utilizando HTML5 -->

<html lang="pt-br">
<!-- Início do documento HTML.
     O atributo lang="pt-br" informa que o idioma da página é português do Brasil.
     Isso ajuda navegadores, leitores de tela e SEO. -->

<head>
    <!-- A tag <head> contém informações de configuração da página
         que não aparecem diretamente para o usuário -->

    <meta charset="UTF-8">
    <!-- Define o conjunto de caracteres como UTF-8.
         Isso permite usar corretamente acentos e caracteres especiais
         como: ç, ã, é, etc. -->

    <title>API Rick and Morty</title>
    <!-- Título da página que aparece na aba do navegador -->

    <link rel="stylesheet" href="style.css">
    <!-- Importa um arquivo CSS externo chamado "style.css".
         Esse arquivo será responsável pela aparência visual da página
         (cores, espaçamento, layout, etc). -->

</head>

<body>
    <!-- A tag <body> contém todo o conteúdo visível da página -->

    <h1>Personagens Rick and Morty</h1>
    <!-- Título principal da página.
         Indica ao usuário o objetivo do site: mostrar personagens da série. -->

    <button id="buscar">Carregar Personagens</button>
    <!-- Botão que o usuário irá clicar para buscar os personagens.
         O atributo id="buscar" permite que o JavaScript encontre
         esse botão e adicione uma ação de clique nele. -->

    <div id="container"></div>
    <!-- Div vazia que funcionará como um "container".
         O JavaScript irá inserir aqui dinamicamente
         os personagens vindos da API (nome, imagem, etc). -->

    <script src="script.js"></script>
    <!-- Importa um arquivo JavaScript externo chamado "script.js".
         Esse arquivo será responsável pela lógica da aplicação,
         como acessar a API do Rick and Morty e exibir os dados. -->

</body>

</html>
